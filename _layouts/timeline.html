---
layout: default
---

<div class="page-header">
  <p class="eyebrow">History</p>
  <h1 class="section-title">Server Timeline</h1>
  <p class="section-body">Every (probably) milestone, event, and moment of chaos in order.</p>
</div>

<div class="timeline-wrap">
  <div class="timeline-filters" role="group" aria-label="Filter timeline">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="milestone">Milestones</button>
    <button class="filter-btn" data-filter="event">Events</button>
    <button class="filter-btn" data-filter="notable">Notable</button>
  </div>

  <div class="timeline-spine" aria-label="Timeline">
    <div class="timeline-list" id="timeline-list">
      <!-- timeline.json fills this -->
    </div>
  </div>

  <div class="load-more-wrap" id="timeline-load-more-wrap">
    <button class="btn-secondary" id="timeline-load-more">Load more</button>
  </div>
</div>

<div class="card-fullscreen-backdrop" id="card-fullscreen-backdrop" aria-modal="true" role="dialog" aria-label="Event details" hidden>
  <div class="card-fullscreen-wrap">
    <div class="card-fullscreen-panel" id="card-fullscreen-panel">
      <div class="card-fullscreen-content" id="card-fullscreen-content">
        <!-- timeline.json fills this one too -->
      </div>
    </div>
  </div>
</div>

<!-- i like it raw -->
<div class="raw-media-backdrop" id="raw-media-backdrop" aria-modal="true" role="dialog" aria-label="Media fullscreen">
  <div class="raw-media-inner" id="raw-media-inner">
    <!-- and timeline.json also fills this one too -->
  </div>
</div>
